<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Wireframe - Login - SIGAE</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:#fff;padding:20px}h3{text-align:center;color:#003087;margin-bottom:15px}</style>
</head>
<body>
<h3>Wireframe 1: Pantalla de Login</h3>
<svg viewBox="0 0 800 500" width="800" height="500" style="display:block;margin:0 auto;border:1px solid #ddd;border-radius:8px">

<!-- Fondo izquierdo (formulario) -->
<rect x="0" y="0" width="480" height="500" fill="#fff"/>

<!-- Fondo derecho (visual) -->
<rect x="480" y="0" width="320" height="500" fill="#CC0000" rx="0"/>
<circle cx="700" cy="60" r="80" fill="rgba(255,255,255,.05)"/>
<circle cx="520" cy="440" r="60" fill="rgba(255,255,255,.03)"/>

<!-- Panel derecho: contenido -->
<circle cx="640" cy="180" r="40" fill="#003087" opacity=".9"/>
<circle cx="640" cy="180" r="18" fill="#fff" opacity=".9"/>
<circle cx="640" cy="180" r="8" fill="#CC0000"/>
<text x="640" y="240" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Sistema de Gesti&oacute;n</text>
<text x="640" y="258" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="10">de Inventario y Control</text>
<text x="640" y="273" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="10">de Activos Empresariales</text>
<text x="640" y="460" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="8">Plataforma Empresarial</text>

<!-- Panel izquierdo: logo -->
<rect x="60" y="40" width="35" height="35" rx="6" fill="#CC0000"/>
<circle cx="77" cy="57" r="8" fill="#003087"/>
<circle cx="77" cy="57" r="4" fill="#fff"/>
<text x="105" y="55" fill="#333" font-size="11" font-weight="700">Sistema de Gesti&oacute;n de Inventario</text>
<text x="105" y="68" fill="#999" font-size="8">Control de Activos Empresariales</text>

<!-- Campo: Usuario -->
<text x="60" y="120" fill="#666" font-size="8" font-weight="600" letter-spacing="1">USUARIO</text>
<rect x="60" y="128" width="360" height="38" rx="6" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
<text x="75" y="152" fill="#bbb" font-size="11">admin</text>

<!-- Campo: Contrasena -->
<text x="60" y="190" fill="#666" font-size="8" font-weight="600" letter-spacing="1">CONTRASE&Ntilde;A</text>
<rect x="60" y="198" width="360" height="38" rx="6" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
<text x="75" y="222" fill="#bbb" font-size="11">&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;</text>

<!-- Boton Ingresar -->
<rect x="60" y="260" width="360" height="42" rx="6" fill="#8B0000"/>
<text x="240" y="286" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Ingresar</text>

<!-- Texto inferior -->
<text x="240" y="325" text-anchor="middle" fill="#999" font-size="9">Inicie sesi&oacute;n para continuar</text>

<!-- Credenciales demo -->
<rect x="60" y="350" width="360" height="50" rx="6" fill="#F8F9FA" stroke="#eee"/>
<text x="75" y="370" fill="#666" font-size="9" font-weight="600">Credenciales de prueba:</text>
<text x="75" y="385" fill="#888" font-size="9">Admin: admin / admin123</text>

<!-- Anotaciones wireframe -->
<rect x="60" y="430" width="360" height="45" rx="4" fill="#FFF8E1" stroke="#FFD54F" stroke-dasharray="4,2"/>
<text x="70" y="448" fill="#6D4C00" font-size="8" font-weight="600">Notas del wireframe:</text>
<text x="70" y="462" fill="#6D4C00" font-size="7.5">60% formulario (blanco) | 40% visual (rojo degradado) | Bot&oacute;n #8B0000</text>
</svg>
</body>
</html>
