<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama de Casos de Uso - SIGAE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#fff;padding:20px}
h1{text-align:center;font-size:15pt;color:#003087;margin-bottom:4px}
h2{text-align:center;font-size:10pt;color:#666;margin-bottom:20px;font-weight:400}
</style>
</head>
<body>
<h1>Diagrama de Casos de Uso &mdash; SIGAE</h1>
<h2>Sistema de Gesti&oacute;n de Activos Empresariales</h2>

<svg viewBox="0 0 1000 820" width="1000" height="820" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Triangulo vacio para Generalizacion -->
  <marker id="genArrow" markerWidth="14" markerHeight="10" refX="14" refY="5" orient="auto">
    <polygon points="0 0, 14 5, 0 10" fill="#fff" stroke="#2255aa" stroke-width="1.5"/>
  </marker>
  <!-- Flecha solida para Include / Extend -->
  <marker id="depArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2255aa"/>
  </marker>
</defs>

<!-- ================================================================ -->
<!-- LIMITE DEL SISTEMA                                               -->
<!-- ================================================================ -->
<rect x="230" y="30" width="530" height="720" rx="16" ry="16"
      fill="#F5F8FF" stroke="#2255aa" stroke-width="2"/>
<text x="495" y="58" text-anchor="middle"
      font-size="14" font-weight="700" fill="#2255aa">SIGAE</text>
<text x="495" y="74" text-anchor="middle"
      font-size="9" fill="#6688bb">Sistema de Gesti&oacute;n de Activos Empresariales</text>

<!-- ================================================================ -->
<!-- FUNCION: dibujar actor stickman                                  -->
<!-- cx, cy = centro de la cabeza                                     -->
<!-- ================================================================ -->

<!-- ACTOR: Administrador (arriba izquierda) -->
<circle cx="100" cy="170" r="18" fill="#fff" stroke="#2255aa" stroke-width="2"/>
<line x1="100" y1="188" x2="100" y2="230" stroke="#2255aa" stroke-width="2"/>
<line x1="72"  y1="206" x2="128" y2="206" stroke="#2255aa" stroke-width="2"/>
<line x1="100" y1="230" x2="76"  y2="260" stroke="#2255aa" stroke-width="2"/>
<line x1="100" y1="230" x2="124" y2="260" stroke="#2255aa" stroke-width="2"/>
<text x="100" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#2255aa">Administrador</text>

<!-- ACTOR: Operador (abajo izquierda) -->
<circle cx="100" cy="530" r="18" fill="#fff" stroke="#2255aa" stroke-width="2"/>
<line x1="100" y1="548" x2="100" y2="590" stroke="#2255aa" stroke-width="2"/>
<line x1="72"  y1="566" x2="128" y2="566" stroke="#2255aa" stroke-width="2"/>
<line x1="100" y1="590" x2="76"  y2="620" stroke="#2255aa" stroke-width="2"/>
<line x1="100" y1="590" x2="124" y2="620" stroke="#2255aa" stroke-width="2"/>
<text x="100" y="640" text-anchor="middle" font-size="12" font-weight="700" fill="#2255aa">Operador</text>

<!-- ACTOR: Sistema (derecha) -->
<circle cx="900" cy="400" r="18" fill="#fff" stroke="#2255aa" stroke-width="2"/>
<line x1="900" y1="418" x2="900" y2="460" stroke="#2255aa" stroke-width="2"/>
<line x1="872" y1="436" x2="928" y2="436" stroke="#2255aa" stroke-width="2"/>
<line x1="900" y1="460" x2="876" y2="490" stroke="#2255aa" stroke-width="2"/>
<line x1="900" y1="460" x2="924" y2="490" stroke="#2255aa" stroke-width="2"/>
<text x="900" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#2255aa">Sistema</text>

<!-- ================================================================ -->
<!-- GENERALIZACION: Admin y Operador heredan de un punto comun       -->
<!-- Admin (abajo) --triangulo--> punto medio                         -->
<!-- Operador (arriba) --triangulo--> punto medio                     -->
<!-- Usamos un punto virtual en y=400 para que ambos apunten ahi      -->
<!-- ================================================================ -->
<!-- Admin hacia abajo -->
<line x1="100" y1="262" x2="100" y2="340" stroke="#2255aa" stroke-width="1.5" marker-end="url(#genArrow)"/>
<text x="60" y="310" font-size="9" fill="#2255aa" font-style="italic">hereda</text>

<!-- Punto medio virtual (no visible, solo logico en y=355) -->
<!-- Texto "Usuario" como rol abstracto -->
<rect x="62" y="345" width="76" height="22" rx="4" fill="#EDF2FF" stroke="#2255aa" stroke-width="1" stroke-dasharray="3,2"/>
<text x="100" y="360" text-anchor="middle" font-size="9" fill="#2255aa" font-style="italic">&laquo;Usuario&raquo;</text>

<!-- Operador hacia arriba -->
<line x1="100" y1="528" x2="100" y2="372" stroke="#2255aa" stroke-width="1.5" marker-end="url(#genArrow)"/>
<text x="60" y="460" font-size="9" fill="#2255aa" font-style="italic">hereda</text>

<!-- ================================================================ -->
<!-- CASOS DE USO (elipses bien espaciadas)                           -->
<!-- Fila 1: y=120  |  Fila 2: y=200  |  Fila 3: y=290               -->
<!-- Fila 4: y=380  |  Fila 5: y=470  |  Fila 6: y=560               -->
<!-- Fila 7: y=650  |  Fila 8: y=720                                  -->
<!-- ================================================================ -->

<!-- CU1: Iniciar Sesion  (y=110) -->
<ellipse cx="400" cy="110" rx="105" ry="24" fill="#fff" stroke="#2255aa" stroke-width="1.8"/>
<text x="400" y="114" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="500">Iniciar Sesi&oacute;n</text>

<!-- CU2: Gestionar Activos (y=200) -->
<ellipse cx="370" cy="200" rx="100" ry="24" fill="#fff" stroke="#2255aa" stroke-width="1.8"/>
<text x="370" y="204" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="500">Gestionar Activos</text>

<!-- CU3: Validar Serial (y=200, derecha) -->
<ellipse cx="620" cy="160" rx="85" ry="20" fill="#fff" stroke="#2255aa" stroke-width="1.3"/>
<text x="620" y="164" text-anchor="middle" font-size="10" fill="#1a1a1a">Validar Serial &Uacute;nico</text>

<!-- CU4: Exportar CSV (y=245, derecha) -->
<ellipse cx="620" cy="240" rx="75" ry="20" fill="#fff" stroke="#2255aa" stroke-width="1.3"/>
<text x="620" y="244" text-anchor="middle" font-size="10" fill="#1a1a1a">Exportar CSV</text>

<!-- CU5: Gestionar Empleados (y=310) -->
<ellipse cx="370" cy="310" rx="105" ry="24" fill="#fff" stroke="#2255aa" stroke-width="1.8"/>
<text x="370" y="314" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="500">Gestionar Empleados</text>

<!-- CU6: Dar Baja / Reactivar (y=310, derecha) -->
<ellipse cx="625" cy="310" rx="85" ry="20" fill="#fff" stroke="#2255aa" stroke-width="1.3"/>
<text x="625" y="314" text-anchor="middle" font-size="10" fill="#1a1a1a">Dar Baja / Reactivar</text>

<!-- CU7: Asignar Activo (y=410) -->
<ellipse cx="380" cy="410" rx="115" ry="24" fill="#fff" stroke="#2255aa" stroke-width="1.8"/>
<text x="380" y="414" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="500">Asignar Activo a Empleado</text>

<!-- CU8: Registrar Devolucion (y=410, derecha) -->
<ellipse cx="630" cy="410" rx="90" ry="20" fill="#fff" stroke="#2255aa" stroke-width="1.3"/>
<text x="630" y="414" text-anchor="middle" font-size="10" fill="#1a1a1a">Registrar Devoluci&oacute;n</text>

<!-- CU9: Cambiar Estado Activo (y=470, derecha) -->
<ellipse cx="630" cy="470" rx="90" ry="20" fill="#fff" stroke="#2255aa" stroke-width="1.3"/>
<text x="630" y="474" text-anchor="middle" font-size="10" fill="#1a1a1a">Cambiar Estado Activo</text>

<!-- CU10: Gestionar Sedes (y=530) - solo Admin -->
<ellipse cx="380" cy="530" rx="90" ry="24" fill="#FFF5F5" stroke="#cc3333" stroke-width="1.8"/>
<text x="380" y="534" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="500">Gestionar Sedes</text>

<!-- CU11: Gestionar Departamentos (y=530, derecha) - solo Admin -->
<ellipse cx="620" cy="560" rx="105" ry="22" fill="#FFF5F5" stroke="#cc3333" stroke-width="1.5"/>
<text x="620" y="564" text-anchor="middle" font-size="10" fill="#1a1a1a">Gestionar Departamentos</text>

<!-- CU12: Generar Reportes (y=630) -->
<ellipse cx="380" cy="630" rx="95" ry="24" fill="#fff" stroke="#2255aa" stroke-width="1.8"/>
<text x="380" y="634" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="500">Generar Reportes</text>

<!-- CU13: Gestionar Usuarios (y=720) - solo Admin -->
<ellipse cx="380" cy="720" rx="95" ry="24" fill="#FFF5F5" stroke="#cc3333" stroke-width="1.8"/>
<text x="380" y="724" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="500">Gestionar Usuarios</text>

<!-- ================================================================ -->
<!-- ASOCIACIONES: Admin (lineas desde x=130 hacia las elipses)       -->
<!-- Solo las exclusivas de Admin                                     -->
<!-- ================================================================ -->
<line x1="130" y1="200" x2="290" y2="530" stroke="#2255aa" stroke-width="1.2"/>
<line x1="130" y1="205" x2="515" y2="555" stroke="#2255aa" stroke-width="1.2"/>
<line x1="130" y1="215" x2="285" y2="720" stroke="#2255aa" stroke-width="1.2"/>

<!-- ================================================================ -->
<!-- ASOCIACIONES: desde el punto "Usuario" (x=140, y=355)            -->
<!-- Estas son las que comparten Admin y Operador                     -->
<!-- ================================================================ -->
<line x1="140" y1="355" x2="295" y2="110" stroke="#2255aa" stroke-width="1.2"/>
<line x1="140" y1="355" x2="270" y2="200" stroke="#2255aa" stroke-width="1.2"/>
<line x1="140" y1="355" x2="265" y2="310" stroke="#2255aa" stroke-width="1.2"/>
<line x1="140" y1="355" x2="265" y2="410" stroke="#2255aa" stroke-width="1.2"/>
<line x1="140" y1="355" x2="285" y2="630" stroke="#2255aa" stroke-width="1.2"/>

<!-- ================================================================ -->
<!-- ASOCIACIONES: Sistema (desde x=880 hacia la derecha de elipses)  -->
<!-- ================================================================ -->
<line x1="880" y1="395" x2="705" y2="165" stroke="#2255aa" stroke-width="1.2"/>
<line x1="880" y1="400" x2="720" y2="470" stroke="#2255aa" stroke-width="1.2"/>

<!-- ================================================================ -->
<!-- INCLUDE: linea punteada con flecha y etiqueta                    -->
<!-- Gestionar Activos --include--> Validar Serial                    -->
<!-- ================================================================ -->
<line x1="470" y1="192" x2="535" y2="168" stroke="#2255aa" stroke-width="1.2"
      stroke-dasharray="7,4" marker-end="url(#depArrow)"/>
<text x="490" y="172" text-anchor="middle" font-size="8.5" fill="#2255aa" font-style="italic">&lt;&lt;include&gt;&gt;</text>

<!-- Asignar Activo --include--> Registrar Devolucion -->
<line x1="495" y1="410" x2="540" y2="410" stroke="#2255aa" stroke-width="1.2"
      stroke-dasharray="7,4" marker-end="url(#depArrow)"/>
<text x="520" y="402" text-anchor="middle" font-size="8.5" fill="#2255aa" font-style="italic">&lt;&lt;include&gt;&gt;</text>

<!-- Asignar Activo --include--> Cambiar Estado -->
<line x1="470" y1="430" x2="540" y2="465" stroke="#2255aa" stroke-width="1.2"
      stroke-dasharray="7,4" marker-end="url(#depArrow)"/>
<text x="495" y="455" text-anchor="middle" font-size="8.5" fill="#2255aa" font-style="italic">&lt;&lt;include&gt;&gt;</text>

<!-- ================================================================ -->
<!-- EXTEND: linea punteada con flecha y etiqueta                     -->
<!-- Exportar CSV --extend--> Gestionar Activos                       -->
<!-- ================================================================ -->
<line x1="545" y1="235" x2="470" y2="210" stroke="#2255aa" stroke-width="1.2"
      stroke-dasharray="7,4" marker-end="url(#depArrow)"/>
<text x="520" y="218" text-anchor="middle" font-size="8.5" fill="#2255aa" font-style="italic">&lt;&lt;extend&gt;&gt;</text>

<!-- Dar Baja --extend--> Gestionar Empleados -->
<line x1="540" y1="308" x2="475" y2="310" stroke="#2255aa" stroke-width="1.2"
      stroke-dasharray="7,4" marker-end="url(#depArrow)"/>
<text x="510" y="300" text-anchor="middle" font-size="8.5" fill="#2255aa" font-style="italic">&lt;&lt;extend&gt;&gt;</text>

<!-- Gestionar Departamentos --extend--> Gestionar Sedes -->
<line x1="530" y1="548" x2="470" y2="535" stroke="#2255aa" stroke-width="1.2"
      stroke-dasharray="7,4" marker-end="url(#depArrow)"/>
<text x="505" y="535" text-anchor="middle" font-size="8.5" fill="#2255aa" font-style="italic">&lt;&lt;extend&gt;&gt;</text>

<!-- ================================================================ -->
<!-- LEYENDA                                                          -->
<!-- ================================================================ -->
<rect x="790" y="610" width="195" height="190" rx="10" fill="#FAFBFF" stroke="#ccc" stroke-width="1"/>
<text x="810" y="632" font-size="11" font-weight="700" fill="#2255aa">Simbolog&iacute;a UML</text>

<!-- Actor -->
<circle cx="812" cy="652" r="7" fill="#fff" stroke="#2255aa" stroke-width="1.5"/>
<line x1="812" y1="659" x2="812" y2="668" stroke="#2255aa" stroke-width="1.5"/>
<line x1="804" y1="663" x2="820" y2="663" stroke="#2255aa" stroke-width="1.5"/>
<text x="835" y="665" font-size="9" fill="#333">Actor</text>

<!-- Caso de uso -->
<ellipse cx="812" cy="688" rx="16" ry="9" fill="#fff" stroke="#2255aa" stroke-width="1.2"/>
<text x="835" y="692" font-size="9" fill="#333">Caso de uso</text>

<!-- Solo Admin -->
<ellipse cx="812" cy="712" rx="16" ry="9" fill="#FFF5F5" stroke="#cc3333" stroke-width="1.2"/>
<text x="835" y="716" font-size="9" fill="#333">Solo Admin</text>

<!-- Asociacion -->
<line x1="798" y1="734" x2="828" y2="734" stroke="#2255aa" stroke-width="1.3"/>
<text x="835" y="738" font-size="9" fill="#333">Asociaci&oacute;n</text>

<!-- Generalizacion -->
<line x1="798" y1="756" x2="828" y2="756" stroke="#2255aa" stroke-width="1.3" marker-end="url(#genArrow)"/>
<text x="835" y="760" font-size="9" fill="#333">Generalizaci&oacute;n</text>

<!-- Include -->
<line x1="798" y1="778" x2="828" y2="778" stroke="#2255aa" stroke-width="1.2" stroke-dasharray="7,4" marker-end="url(#depArrow)"/>
<text x="835" y="782" font-size="9" fill="#333">&lt;&lt;include&gt;&gt;</text>

<!-- Extend -->
<line x1="798" y1="792" x2="828" y2="792" stroke="#2255aa" stroke-width="1.2" stroke-dasharray="7,4" marker-end="url(#depArrow)"/>
<text x="835" y="796" font-size="9" fill="#333">&lt;&lt;extend&gt;&gt;</text>

</svg>
</body>
</html>
