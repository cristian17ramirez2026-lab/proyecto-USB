<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama de Casos de Uso - InventPro</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#fff;padding:40px;margin:0}
h1{text-align:center;font-size:18pt;color:#1a3c5e;margin-bottom:30px}
svg{display:block;margin:0 auto}
.actor{fill:#fff;stroke:#333;stroke-width:2}
.usecase{fill:#e8f4fd;stroke:#2a5f8f;stroke-width:2;rx:30;ry:20}
.package{fill:none;stroke:#999;stroke-width:1;stroke-dasharray:6,3;rx:8}
.pkg-label{font-size:11px;fill:#666;font-weight:bold}
.uc-text{font-size:10px;fill:#1a3c5e;text-anchor:middle;font-weight:500}
.actor-text{font-size:10px;fill:#333;text-anchor:middle}
.line{stroke:#666;stroke-width:1.5;fill:none}
.line-dash{stroke:#666;stroke-width:1.2;fill:none;stroke-dasharray:5,3}
.arrow{fill:#666}
.note{font-size:9px;fill:#888;text-anchor:middle}
.inherit{stroke:#333;stroke-width:1.5;fill:none;marker-end:url(#arrowhead)}
</style>
</head>
<body>
<h1>Diagrama de Casos de Uso — InventPro</h1>
<svg width="900" height="680" viewBox="0 0 900 680">
<defs>
<marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#666"/></marker>
<marker id="triangle" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="none" stroke="#333" stroke-width="1"/></marker>
</defs>

<!-- ACTORES -->
<!-- SuperAdmin -->
<circle cx="60" cy="140" r="14" class="actor"/>
<line x1="60" y1="154" x2="60" y2="190" stroke="#333" stroke-width="2"/>
<line x1="40" y1="168" x2="80" y2="168" stroke="#333" stroke-width="2"/>
<line x1="60" y1="190" x2="42" y2="215" stroke="#333" stroke-width="2"/>
<line x1="60" y1="190" x2="78" y2="215" stroke="#333" stroke-width="2"/>
<text x="60" y="232" class="actor-text">SuperAdmin</text>

<!-- Admin Sede -->
<circle cx="60" cy="310" r="14" class="actor"/>
<line x1="60" y1="324" x2="60" y2="360" stroke="#333" stroke-width="2"/>
<line x1="40" y1="338" x2="80" y2="338" stroke="#333" stroke-width="2"/>
<line x1="60" y1="360" x2="42" y2="385" stroke="#333" stroke-width="2"/>
<line x1="60" y1="360" x2="78" y2="385" stroke="#333" stroke-width="2"/>
<text x="60" y="402" class="actor-text">Admin Sede</text>

<!-- Admin Depto -->
<circle cx="60" cy="470" r="14" class="actor"/>
<line x1="60" y1="484" x2="60" y2="520" stroke="#333" stroke-width="2"/>
<line x1="40" y1="498" x2="80" y2="498" stroke="#333" stroke-width="2"/>
<line x1="60" y1="520" x2="42" y2="545" stroke="#333" stroke-width="2"/>
<line x1="60" y1="520" x2="78" y2="545" stroke="#333" stroke-width="2"/>
<text x="60" y="562" class="actor-text">Admin Depto</text>

<!-- Usuario -->
<circle cx="60" cy="620" r="14" class="actor"/>
<line x1="60" y1="634" x2="60" y2="660" stroke="#333" stroke-width="2"/>
<line x1="40" y1="648" x2="80" y2="648" stroke="#333" stroke-width="2"/>
<line x1="60" y1="660" x2="42" y2="675" stroke="#333" stroke-width="2"/>
<line x1="60" y1="660" x2="78" y2="675" stroke="#333" stroke-width="2"/>
<text x="60" y="690" class="actor-text" style="font-size:9px">Usuario</text>

<!-- Herencia entre actores -->
<line x1="60" y1="240" x2="60" y2="296" class="inherit" marker-end="url(#triangle)"/>
<line x1="60" y1="410" x2="60" y2="456" class="inherit" marker-end="url(#triangle)"/>
<line x1="60" y1="568" x2="60" y2="606" class="inherit" marker-end="url(#triangle)"/>

<!-- PAQUETE: Autenticacion -->
<rect x="160" y="20" width="300" height="100" class="package"/>
<text x="175" y="38" class="pkg-label">Autenticacion</text>
<ellipse cx="260" cy="70" rx="70" ry="22" class="usecase"/>
<text x="260" y="74" class="uc-text">CU01 Iniciar Sesion</text>
<ellipse cx="400" cy="70" rx="70" ry="22" class="usecase"/>
<text x="400" y="74" class="uc-text">CU02 Cerrar Sesion</text>

<!-- PAQUETE: Gestion Inventario -->
<rect x="160" y="140" width="420" height="160" class="package"/>
<text x="175" y="158" class="pkg-label">Gestion de Inventario</text>
<ellipse cx="280" cy="190" rx="80" ry="22" class="usecase"/>
<text x="280" y="194" class="uc-text">CU03 Gestionar Activos</text>
<ellipse cx="480" cy="190" rx="75" ry="22" class="usecase"/>
<text x="480" y="194" class="uc-text">CU04 Buscar Activos</text>
<ellipse cx="280" cy="260" rx="85" ry="22" class="usecase"/>
<text x="280" y="264" class="uc-text">CU05 Gestionar Empleados</text>
<ellipse cx="490" cy="260" rx="80" ry="22" class="usecase"/>
<text x="490" y="264" class="uc-text">CU06 Buscar Empleados</text>

<!-- extend -->
<line x1="360" y1="190" x2="405" y2="190" class="line-dash" marker-end="url(#arrowhead)"/>
<text x="383" y="183" class="note">extend</text>
<line x1="365" y1="260" x2="410" y2="260" class="line-dash" marker-end="url(#arrowhead)"/>
<text x="388" y="253" class="note">extend</text>

<!-- PAQUETE: Asignaciones -->
<rect x="160" y="320" width="420" height="130" class="package"/>
<text x="175" y="338" class="pkg-label">Asignaciones</text>
<ellipse cx="280" cy="370" rx="75" ry="22" class="usecase"/>
<text x="280" y="374" class="uc-text">CU07 Asignar Activo</text>
<ellipse cx="280" cy="420" rx="80" ry="22" class="usecase"/>
<text x="280" y="424" class="uc-text">CU08 Registrar Devolucion</text>
<ellipse cx="490" cy="395" rx="75" ry="22" class="usecase"/>
<text x="490" y="399" class="uc-text">CU09 Registrar Actividad</text>

<!-- include -->
<line x1="355" y1="370" x2="415" y2="390" class="line-dash" marker-end="url(#arrowhead)"/>
<text x="390" y="373" class="note">include</text>
<line x1="360" y1="420" x2="415" y2="400" class="line-dash" marker-end="url(#arrowhead)"/>
<text x="390" y="423" class="note">include</text>

<!-- PAQUETE: Reportes y Admin -->
<rect x="160" y="470" width="420" height="130" class="package"/>
<text x="175" y="488" class="pkg-label">Reportes y Administracion</text>
<ellipse cx="270" cy="520" rx="75" ry="22" class="usecase"/>
<text x="270" y="524" class="uc-text">CU10 Generar Reportes</text>
<ellipse cx="460" cy="520" rx="80" ry="22" class="usecase"/>
<text x="460" y="524" class="uc-text">CU11 Gestionar Usuarios</text>
<ellipse cx="360" cy="570" rx="80" ry="22" class="usecase"/>
<text x="360" y="574" class="uc-text">CU12 Consultar Log</text>

<!-- LINEAS Actor -> Casos de Uso -->
<!-- SuperAdmin a todo -->
<line x1="90" y1="160" x2="190" y2="70" class="line"/>
<line x1="90" y1="170" x2="200" y2="190" class="line"/>
<line x1="90" y1="175" x2="200" y2="260" class="line"/>
<line x1="90" y1="180" x2="205" y2="370" class="line"/>
<line x1="90" y1="180" x2="200" y2="420" class="line"/>
<line x1="90" y1="185" x2="195" y2="520" class="line"/>
<line x1="90" y1="185" x2="380" y2="520" class="line"/>
<line x1="90" y1="185" x2="280" y2="570" class="line"/>

<!-- Admin Sede a inventario y asignaciones -->
<line x1="90" y1="330" x2="200" y2="190" class="line"/>
<line x1="90" y1="340" x2="200" y2="260" class="line"/>
<line x1="90" y1="345" x2="205" y2="370" class="line"/>
<line x1="90" y1="350" x2="200" y2="420" class="line"/>

<!-- Admin Depto a inventario y asignaciones -->
<line x1="90" y1="490" x2="200" y2="260" class="line"/>
<line x1="90" y1="495" x2="205" y2="370" class="line"/>

<!-- Usuario a busqueda y reportes -->
<line x1="90" y1="630" x2="405" y2="190" class="line"/>
<line x1="90" y1="635" x2="410" y2="260" class="line"/>
<line x1="90" y1="640" x2="195" y2="520" class="line"/>

<!-- Titulo del sistema -->
<rect x="150" y="5" width="440" height="600" fill="none" stroke="#1a3c5e" stroke-width="2" rx="10"/>
<text x="370" y="660" style="font-size:12px;fill:#1a3c5e;text-anchor:middle;font-weight:bold">Sistema InventPro</text>
</svg>
<p style="text-align:center;color:#888;font-size:10px;margin-top:20px">Diagrama de Casos de Uso — InventPro v3.0 | Notacion UML</p>
</body>
</html>
