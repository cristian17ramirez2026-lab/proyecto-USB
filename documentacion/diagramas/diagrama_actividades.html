<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama de Actividades - InventPro</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#fff;padding:40px;margin:0}
h1{text-align:center;font-size:18pt;color:#1a3c5e;margin-bottom:10px}
h2{text-align:center;font-size:13pt;color:#2a5f8f;margin:30px 0 15px}
svg{display:block;margin:0 auto}
.start{fill:#1a3c5e}.end{fill:#1a3c5e;stroke:#1a3c5e;stroke-width:3}
.action{fill:#e8f4fd;stroke:#2a5f8f;stroke-width:2;rx:8}
.decision{fill:#fff3cd;stroke:#d4a017;stroke-width:2}
.action-text{font-size:10px;fill:#1a3c5e;text-anchor:middle;font-weight:500}
.dec-text{font-size:9px;fill:#8b6914;text-anchor:middle;font-weight:bold}
.flow{stroke:#666;stroke-width:1.5;fill:none;marker-end:url(#fa)}
.label{font-size:8px;fill:#666}
.error{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:8}
.error-text{font-size:9px;fill:#991b1b;text-anchor:middle}
.ok{fill:#d1fae5;stroke:#059669;stroke-width:2;rx:8}
.ok-text{font-size:9px;fill:#065f46;text-anchor:middle}
.swim{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1}
.swim-label{font-size:10px;fill:#64748b;font-weight:bold;writing-mode:vertical-rl;text-orientation:mixed}
</style>
</head>
<body>
<h1>Diagramas de Actividades — InventPro</h1>

<h2>Actividad 1: Flujo de Asignacion de Activo</h2>
<svg width="700" height="600" viewBox="0 0 700 600">
<defs><marker id="fa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#666"/></marker></defs>

<!-- Swimlanes -->
<rect x="10" y="10" width="230" height="580" class="swim"/>
<text x="20" y="30" style="font-size:10px;fill:#2a5f8f;font-weight:bold">Administrador</text>
<rect x="250" y="10" width="230" height="580" class="swim"/>
<text x="260" y="30" style="font-size:10px;fill:#2a5f8f;font-weight:bold">Sistema</text>
<rect x="490" y="10" width="200" height="580" class="swim"/>
<text x="500" y="30" style="font-size:10px;fill:#2a5f8f;font-weight:bold">Base de Datos</text>

<!-- Inicio -->
<circle cx="120" cy="60" r="12" class="start"/>
<line x1="120" y1="72" x2="120" y2="95" class="flow"/>

<!-- Accion 1 -->
<rect x="40" y="95" width="160" height="35" class="action"/>
<text x="120" y="117" class="action-text">Navegar a Asignaciones</text>
<line x1="120" y1="130" x2="365" y2="130" class="flow"/>

<!-- Accion 2 -->
<rect x="285" y="140" width="160" height="35" class="action"/>
<text x="365" y="157" class="action-text">Cargar activos disponibles</text>
<text x="365" y="168" class="action-text">y lista de empleados</text>
<line x1="365" y1="175" x2="365" y2="195" class="flow"/>

<!-- Accion 3 -->
<rect x="285" y="195" width="160" height="35" class="action"/>
<text x="365" y="217" class="action-text">Renderizar formulario</text>
<line x1="285" y1="212" x2="200" y2="212" class="flow"/>

<!-- Accion 4 -->
<rect x="40" y="240" width="160" height="35" class="action"/>
<text x="120" y="257" class="action-text">Seleccionar activo,</text>
<text x="120" y="268" class="action-text">empleado y observaciones</text>
<line x1="120" y1="275" x2="120" y2="300" class="flow"/>

<!-- Accion 5 -->
<rect x="40" y="300" width="160" height="30" class="action"/>
<text x="120" y="320" class="action-text">Clic "Registrar"</text>
<line x1="200" y1="315" x2="330" y2="315" class="flow"/>

<!-- Decision -->
<polygon points="365,340 405,365 365,390 325,365" class="decision"/>
<text x="365" y="368" class="dec-text">Estado?</text>

<!-- Si DISPONIBLE -->
<line x1="405" y1="365" x2="590" y2="365" class="flow"/>
<text x="470" y="358" class="label">[DISPONIBLE]</text>

<rect x="510" y="380" width="160" height="30" class="action"/>
<text x="590" y="400" class="action-text">Crear registro asignacion</text>
<line x1="590" y1="410" x2="590" y2="430" class="flow"/>

<rect x="510" y="430" width="160" height="30" class="action"/>
<text x="590" y="450" class="action-text">Estado → ASIGNADO</text>
<line x1="590" y1="460" x2="590" y2="480" class="flow"/>

<rect x="510" y="480" width="160" height="30" class="action"/>
<text x="590" y="500" class="action-text">Registrar en log</text>
<line x1="510" y1="495" x2="365" y2="495" class="flow"/>

<rect x="285" y="510" width="160" height="30" class="ok"/>
<text x="365" y="530" class="ok-text">Notificacion de exito</text>
<line x1="365" y1="540" x2="365" y2="565" class="flow"/>

<!-- Fin OK -->
<circle cx="365" cy="575" r="10" fill="none" stroke="#1a3c5e" stroke-width="3"/>
<circle cx="365" cy="575" r="6" class="start"/>

<!-- Si NO DISPONIBLE -->
<line x1="365" y1="390" x2="365" y2="430" class="flow"/>
<text x="310" y="415" class="label">[ASIGNADO o DAÑADO]</text>

<rect x="285" y="430" width="160" height="30" class="error"/>
<text x="365" y="450" class="error-text">Mostrar error</text>
<line x1="285" y1="445" x2="120" y2="445" class="flow"/>

<!-- Volver -->
<rect x="40" y="430" width="160" height="30" class="action"/>
<text x="120" y="450" class="action-text">Corregir seleccion</text>
<line x1="120" y1="430" x2="120" y2="275" class="flow" style="stroke-dasharray:4,3"/>
</svg>

<h2>Actividad 2: Flujo de Gestion de Activo (CRUD)</h2>
<svg width="650" height="500" viewBox="0 0 650 500">
<!-- Inicio -->
<circle cx="325" cy="30" r="12" class="start"/>
<line x1="325" y1="42" x2="325" y2="60" class="flow"/>

<!-- Verificar rol -->
<polygon points="325,60 375,85 325,110 275,85" class="decision"/>
<text x="325" y="88" class="dec-text">Rol?</text>

<!-- USER -->
<line x1="275" y1="85" x2="100" y2="85" class="flow"/>
<text x="180" y="78" class="label">[USER]</text>
<rect x="30" y="95" width="140" height="30" class="action"/>
<text x="100" y="115" class="action-text">Mostrar tabla solo lectura</text>
<line x1="100" y1="125" x2="100" y2="150" class="flow"/>
<circle cx="100" cy="160" r="10" fill="none" stroke="#1a3c5e" stroke-width="3"/>
<circle cx="100" cy="160" r="6" class="start"/>

<!-- ADMIN -->
<line x1="325" y1="110" x2="325" y2="140" class="flow"/>
<text x="340" y="130" class="label">[ADMIN]</text>

<rect x="245" y="140" width="160" height="30" class="action"/>
<text x="325" y="160" class="action-text">Mostrar tabla con acciones</text>
<line x1="325" y1="170" x2="325" y2="195" class="flow"/>

<!-- Decision accion -->
<polygon points="325,195 385,225 325,255 265,225" class="decision"/>
<text x="325" y="228" class="dec-text">Accion?</text>

<!-- Crear -->
<line x1="265" y1="225" x2="100" y2="225" class="flow"/>
<text x="170" y="218" class="label">[Crear]</text>
<rect x="30" y="240" width="140" height="25" class="action"/>
<text x="100" y="257" class="action-text">Formulario vacio</text>
<line x1="100" y1="265" x2="100" y2="285" class="flow"/>
<rect x="30" y="285" width="140" height="25" class="action"/>
<text x="100" y="302" class="action-text">Validar campos</text>
<line x1="100" y1="310" x2="100" y2="330" class="flow"/>
<polygon points="100,330 130,350 100,370 70,350" class="decision"/>
<text x="100" y="353" class="dec-text" style="font-size:8px">Serial?</text>
<line x1="70" y1="350" x2="20" y2="350" class="flow"/>
<text x="35" y="343" class="label">[duplicado]</text>
<rect x="-30" y="360" width="100" height="25" class="error"/>
<text x="20" y="377" class="error-text">Error serial</text>
<line x1="130" y1="350" x2="200" y2="350" class="flow"/>
<text x="155" y="343" class="label">[unico]</text>
<rect x="200" y="340" width="120" height="25" class="ok"/>
<text x="260" y="357" class="ok-text">Crear activo</text>
<line x1="260" y1="365" x2="260" y2="390" class="flow"/>

<!-- Editar -->
<line x1="325" y1="255" x2="325" y2="290" class="flow"/>
<text x="340" y="278" class="label">[Editar]</text>
<rect x="265" y="290" width="120" height="25" class="action"/>
<text x="325" y="307" class="action-text">Cargar datos</text>
<line x1="325" y1="315" x2="325" y2="340" class="flow"/>
<rect x="265" y="340" width="120" height="25" class="action"/>
<text x="325" y="357" class="action-text">Validar y guardar</text>
<line x1="325" y1="365" x2="325" y2="390" class="flow"/>

<!-- Eliminar -->
<line x1="385" y1="225" x2="530" y2="225" class="flow"/>
<text x="460" y="218" class="label">[Eliminar]</text>
<polygon points="530,240 570,260 530,280 490,260" class="decision"/>
<text x="530" y="263" class="dec-text" style="font-size:7px">Asignado?</text>
<line x1="570" y1="260" x2="620" y2="260" class="flow"/>
<text x="590" y="253" class="label">[Si]</text>
<rect x="580" y="270" width="60" height="25" class="error"/>
<text x="610" y="287" class="error-text" style="font-size:8px">Error</text>
<line x1="530" y1="280" x2="530" y2="310" class="flow"/>
<text x="545" y="298" class="label">[No]</text>
<rect x="470" y="310" width="120" height="25" class="action"/>
<text x="530" y="327" class="action-text">Confirmar y eliminar</text>
<line x1="530" y1="335" x2="530" y2="390" class="flow"/>

<!-- Convergencia -->
<rect x="200" y="390" width="380" height="30" class="ok"/>
<text x="390" y="410" class="ok-text">Registrar en log + Notificacion + Recargar lista</text>
<line x1="390" y1="420" x2="390" y2="450" class="flow"/>

<!-- Fin -->
<circle cx="390" cy="460" r="10" fill="none" stroke="#1a3c5e" stroke-width="3"/>
<circle cx="390" cy="460" r="6" class="start"/>
</svg>

<p style="text-align:center;color:#888;font-size:10px;margin-top:30px">Diagramas de Actividades — InventPro v3.0 | Notacion UML</p>
</body>
</html>
