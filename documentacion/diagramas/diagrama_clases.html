<!-- ============================================================ -->
<!-- RELACIONES                                                   -->
<!-- ============================================================ -->

<!-- R1: Sede(bottom:280, x=170) ◆───── Departamento(top:340, x=170) -->
<!-- Composicion: diamante relleno en lado Sede -->
<line x1="170" y1="280" x2="170" y2="340" class="rel"/>
<polygon points="170,280 163,292 170,304 177,292" class="dia-f"/>
<text x="180" y="298" class="card">1</text>
<text x="180" y="336" class="card">*</text>
<text x="120" y="315" class="lbl">contiene</text>

<!-- R2: Sede(bottom:280, x=80) ◇───── Activo(top:610, x=80) -->
<!-- Agregacion: diamante vacio en lado Sede -->
<line x1="80" y1="280" x2="80" y2="610" class="rel"/>
<polygon points="80,280 73,292 80,304 87,292" class="dia-e"/>
<text x="88" y="298" class="card">1</text>
<text x="88" y="605" class="card">*</text>
<text x="42" y="445" class="lbl">alberga</text>

<!-- R3: Sede(right:300, y=160) ────── Empleado(left:580, y=400) -->
<!-- Asociacion con esquina para no cruzar -->
<polyline points="300,160 440,160 440,400 580,400" class="rel"/>
<text x="305" y="155" class="card">1</text>
<text x="565" y="395" class="card">*</text>
<text x="445" y="155" class="lbl">emplea</text>

<!-- R4: Departamento(right:310, y=430) ────── Empleado(left:580, y=450) -->
<line x1="310" y1="430" x2="580" y2="450" class="rel"/>
<text x="315" y="425" class="card">1</text>
<text x="565" y="445" class="card">*</text>
<text x="430" y="450" class="lbl">agrupa</text>

<!-- R5: Departamento(bottom:530, x=220) ─ ─ ─ Activo(top:610, x=220) -->
<!-- Asociacion opcional (punteada) -->
<line x1="220" y1="530" x2="220" y2="610" stroke="#1a3a6b" stroke-width="1.4" stroke-dasharray="6,4" fill="none"/>
<text x="228" y="548" class="card">1</text>
<text x="228" y="606" class="card">*</text>

<!-- R6: Activo(right:340, y=750) ═════ Asignacion(left:540, y=780) -->
<!-- PROTECT: linea roja gruesa -->
<line x1="340" y1="750" x2="540" y2="780" class="rel-p"/>
<text x="345" y="745" class="card-r">1</text>
<text x="525" y="775" class="card-r">*</text>
<text x="410" y="775" class="lbl" style="fill:#b71c1c;font-weight:600">PROTECT</text>

<!-- R7: Empleado(bottom:580, x=720) ═════ Asignacion(top:700, x=720) -->
<!-- PROTECT: linea roja gruesa -->
<line x1="720" y1="580" x2="720" y2="700" class="rel-p"/>
<text x="728" y="598" class="card-r">1</text>
<text x="728" y="696" class="card-r">*</text>
<text x="735" y="645" class="lbl" style="fill:#b71c1c;font-weight:600">PROTECT</text>

<!-- ============================================================ -->
<!-- LEYENDA                                                      -->
<!-- ============================================================ -->
<rect x="880" y="680" width="280" height="200" rx="6" fill="#fff" stroke="#ccd" stroke-width="1"/>
<text x="900" y="700" style="font-size:11px;fill:#1a3a6b;font-weight:700;font-family:'Segoe UI',sans-serif">Simbolog&iacute;a UML</text>

<text x="900" y="720" class="at"><tspan class="at-v">-</tspan> atributo privado &nbsp;&nbsp; <tspan class="at-v">+</tspan> m&eacute;todo p&uacute;blico</text>
<text x="900" y="738" class="at"><tspan class="key">PK</tspan> Primary Key &nbsp; <tspan class="key">FK</tspan> Foreign Key &nbsp; <tspan class="key">UK</tspan> Unique</text>

<!-- Composicion -->
<polygon points="900,755 906,749 912,755 906,761" class="dia-f"/>
<line x1="912" y1="755" x2="935" y2="755" class="rel"/>
<text x="940" y="759" style="font-size:9px;fill:#333;font-family:'Segoe UI',sans-serif">Composici&oacute;n (1:N fuerte)</text>

<!-- Agregacion -->
<polygon points="900,775 906,769 912,775 906,781" class="dia-e"/>
<line x1="912" y1="775" x2="935" y2="775" class="rel"/>
<text x="940" y="779" style="font-size:9px;fill:#333;font-family:'Segoe UI',sans-serif">Agregaci&oacute;n (1:N d&eacute;bil)</text>

<!-- Asociacion -->
<line x1="900" y1="795" x2="935" y2="795" class="rel"/>
<text x="940" y="799" style="font-size:9px;fill:#333;font-family:'Segoe UI',sans-serif">Asociaci&oacute;n</text>

<!-- Opcional -->
<line x1="900" y1="815" x2="935" y2="815" stroke="#1a3a6b" stroke-width="1.4" stroke-dasharray="6,4"/>
<text x="940" y="819" style="font-size:9px;fill:#333;font-family:'Segoe UI',sans-serif">Asociaci&oacute;n opcional</text>

<!-- PROTECT -->
<line x1="900" y1="835" x2="935" y2="835" class="rel-p"/>
<text x="940" y="839" style="font-size:9px;fill:#333;font-family:'Segoe UI',sans-serif">PROTECT (impide eliminar)</text>

<!-- Cardinalidad -->
<text x="900" y="862" style="font-size:9px;fill:#333;font-family:'Segoe UI',sans-serif"><tspan style="font-weight:700;fill:#1a3a6b">1</tspan> &mdash; <tspan style="font-weight:700;fill:#1a3a6b">*</tspan> &nbsp; Cardinalidad uno a muchos</text>

</svg>
